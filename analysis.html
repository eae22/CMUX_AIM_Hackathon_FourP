<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딥페이크 방어 분석 결과 | ShieldFace</title>
<link rel="stylesheet" href="analysis.css">
</head>
<body>

<div class="container" id="app">

  <!-- Header -->
  <div class="header">
    <button class="btn-back" onclick="location.href='result.html'">← 뒤로가기</button>
    <span class="header-logo">ShieldFace</span>
    <span class="header-time" id="analyzed-at"></span>
  </div>

  <!-- Compare card -->
  <div class="card" id="compare-card">
    <div class="compare-header">
      <span class="card-label">사진 비교</span>
    </div>
    <div class="compare-grid">

      <!-- 원본 슬롯 -->
      <div class="compare-slot">
        <div class="compare-img-wrap">
          <img id="img-original" alt="원본 사진">
          <div class="compare-placeholder" id="ph-original">
            <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M4 16l4-4a3 3 0 014 0l4 4M14 14l1.5-1.5a3 3 0 014 0L22 14M8 8h.01M2 6a2 2 0 012-2h16a2 2 0 012 2v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6z"/>
            </svg>
            <span>원본 사진</span>
          </div>
          <div class="compare-tag-row">
            <span class="compare-tag compare-tag-before">원본</span>
          </div>
        </div>
      </div>

      <!-- 보호본 슬롯 -->
      <div class="compare-slot">
        <div class="compare-img-wrap">
          <img id="img-protected" alt="보호본 사진">
          <div class="compare-placeholder" id="ph-protected">
            <svg width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
            <span>보호본 사진</span>
          </div>
          <div class="compare-tag-row">
            <span class="compare-tag compare-tag-after">보호본</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Security status card -->
  <div class="card status-card">
    <div class="card-header">
      <span class="card-label">보안 분석 결과</span>
      <span class="status-badge" id="status-badge">
        <span class="badge-icon" id="badge-icon"></span>
        <span id="badge-label"></span>
      </span>
    </div>
    <div class="status-body">
      <div class="gauge-wrap">
        <svg class="gauge-svg" viewBox="0 0 120 120">
          <circle class="gauge-track" cx="60" cy="60" r="48"/>
          <circle class="gauge-fill" id="gauge-fill" cx="60" cy="60" r="48"/>
        </svg>
        <div class="gauge-center">
          <span class="gauge-pct" id="gauge-pct">0</span>
          <span class="gauge-unit">보호율</span>
        </div>
      </div>
      <div class="status-info">
        <div class="status-title" id="status-title"></div>
        <div class="stat-row">
          <span class="stat-label">유사도 감소</span>
          <span class="stat-val" id="stat-reduction" style="color:var(--safe)"></span>
        </div>
        <div class="stat-row">
          <span class="stat-label">분석 모델</span>
          <span class="stat-val">ArcFace v3</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">변형 레이어</span>
          <span class="stat-val">12단계</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Analysis card: graph + summary merged -->
  <div class="card analysis-card">
    <div class="card-header">
      <span class="card-label">AI 얼굴 인식률</span>
      <span class="analysis-subtitle">보호 후 AI가 얼굴을 거의 인식 못해요</span>
    </div>
    <div class="graph-body">
      <div class="bar-group">
        <div class="bar-label-row">
          <span class="bar-tag">
            <span class="bar-tag-dot" style="background:#ef4444;"></span>
            보호 전
          </span>
          <span class="bar-pct" id="bar-pct-before" style="color:#ef4444;"></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill before" id="bar-before"></div>
        </div>
      </div>
      <div class="bar-group">
        <div class="bar-label-row">
          <span class="bar-tag">
            <span class="bar-tag-dot" style="background:#22c55e;"></span>
            보호 후
          </span>
          <span class="bar-pct" id="bar-pct-after" style="color:#22c55e;"></span>
        </div>
        <div class="bar-track">
          <div class="bar-fill after" id="bar-after"></div>
        </div>
      </div>
    </div>
    <div class="analysis-divider"></div>
    <div class="analysis-summary">
      <div class="ai-main" id="ai-headline"></div>
      <div class="ai-desc" id="ai-desc"></div>
      <div class="ai-tags" id="ai-tags"></div>
    </div>
  </div>

  <!-- Heatmap card -->
  <div class="card" id="heatmap-card">
    <div class="heatmap-header">
      <span class="card-label">AI 주목 영역 (Grad-CAM)</span>
      <span class="analysis-subtitle">보호 전 AI가 집중한 얼굴 부위</span>
    </div>
    <div class="heatmap-body">
      <div class="heatmap-img-wrap">
        <img id="img-heatmap" alt="Grad-CAM heatmap">
        <div class="heatmap-placeholder" id="ph-heatmap">
          <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
          </svg>
          <span>분석 후 표시됩니다</span>
        </div>
      </div>
      <p class="heatmap-caption">붉은 영역일수록 AI가 얼굴로 강하게 인식한 부위예요. 보호 처리 후에는 이 신호가 사라집니다.</p>
    </div>
  </div>

  <!-- Training graph card -->
  <div class="card" id="training-card">
    <div class="training-header">
      <span class="card-label">딥페이크 학습 효율</span>
      <span class="analysis-subtitle">보호 처리 시 AI 학습이 어떻게 막히는지</span>
    </div>
    <div class="training-body">
      <div class="chart-group">
        <span class="chart-title">Loss</span>
        <div class="chart-canvas-wrap">
          <canvas id="chart-loss"></canvas>
        </div>
      </div>
      <div class="chart-group">
        <span class="chart-title">Accuracy</span>
        <div class="chart-canvas-wrap">
          <canvas id="chart-acc"></canvas>
        </div>
      </div>
      <div class="chart-legend">
        <div class="legend-item">
          <span class="legend-dot" style="background:#ef4444;"></span>원본 학습
        </div>
        <div class="legend-item">
          <span class="legend-dot" style="background:#22c55e;"></span>보호본 학습
        </div>
      </div>
      <div class="training-desc" id="desc-loss"></div>
      <div class="training-desc" id="desc-acc"></div>
    </div>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-secondary" onclick="location.href='index.html'">다시 분석</button>
    <button class="btn btn-primary" onclick="shareResult()">결과 공유</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="analysis.js"></script>
</body>
</html>
