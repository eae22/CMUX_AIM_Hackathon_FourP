<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>딥페이크 방어 분석 결과</title>
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2a2a2a;
    --text: #f5f5f5;
    --text-muted: #8e8e8e;
    --safe: #22c55e;
    --safe-dim: rgba(34,197,94,0.15);
    --warn: #eab308;
    --warn-dim: rgba(234,179,8,0.15);
    --danger: #ef4444;
    --danger-dim: rgba(239,68,68,0.15);
    --accent: #a855f7;
    --accent2: #6366f1;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 48px;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ─── Header ─── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 4px;
  }
  .header-logo {
    font-size: 18px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-time {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* ─── Card base ─── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }

  /* ─── Compare card ─── */
  .compare-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 12px;
  }
  .compare-hint {
    font-size: 11px;
    color: var(--text-muted);
  }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
  }
  .compare-slot {
    background: var(--surface);
  }
  .compare-label-wrap {
    display: block;
    cursor: pointer;
  }
  .compare-img-wrap {
    position: relative;
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .compare-img-wrap img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: none;
    transition: opacity 0.3s;
  }
  .compare-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--text-muted);
    padding: 12px;
    text-align: center;
  }
  .compare-placeholder svg { opacity: 0.35; }
  .compare-placeholder span { font-size: 11px; line-height: 1.4; }
  .compare-tag-row {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 24px 10px 10px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .compare-tag {
    font-size: 11px;
    font-weight: 700;
    border-radius: 999px;
    padding: 3px 9px;
    letter-spacing: 0.2px;
  }
  .compare-tag-before {
    background: rgba(239,68,68,0.25);
    color: #fca5a5;
    border: 1px solid rgba(239,68,68,0.4);
  }
  .compare-tag-after {
    background: rgba(34,197,94,0.25);
    color: #86efac;
    border: 1px solid rgba(34,197,94,0.4);
  }
  .compare-upload-icon {
    font-size: 10px;
    color: rgba(255,255,255,0.5);
    display: flex;
    align-items: center;
    gap: 3px;
  }
  .compare-footer {
    padding: 10px 20px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .scan-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .scan-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--safe);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── Status card ─── */
  .status-card .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 0;
  }
  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    border-radius: 999px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .badge-icon {
    font-size: 13px;
  }

  .status-body {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px 20px;
    gap: 20px;
  }

  /* Circular gauge */
  .gauge-wrap {
    position: relative;
    flex-shrink: 0;
    width: 120px;
    height: 120px;
  }
  .gauge-svg {
    transform: rotate(-90deg);
    width: 120px;
    height: 120px;
  }
  .gauge-track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 8;
  }
  .gauge-fill {
    fill: none;
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 301.59;
    stroke-dashoffset: 301.59;
    transition: stroke-dashoffset 1.4s cubic-bezier(0.22, 1, 0.36, 1),
                stroke 0.4s ease;
  }
  .gauge-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .gauge-pct {
    font-size: 28px;
    font-weight: 800;
    line-height: 1;
    letter-spacing: -1px;
  }
  .gauge-unit {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Status info */
  .status-info {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .status-title {
    font-size: 15px;
    font-weight: 700;
    line-height: 1.3;
  }
  .stat-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
  }
  .stat-label { color: var(--text-muted); }
  .stat-val { font-weight: 700; }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 20px;
  }

  /* ─── Analysis card (graph + summary merged) ─── */
  .analysis-card .card-header {
    display: flex;
    flex-direction: column;
    gap: 3px;
    padding: 16px 20px 14px;
  }
  .analysis-subtitle {
    font-size: 12px;
    color: var(--text-muted);
  }
  .graph-body {
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bar-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bar-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .bar-tag {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  .bar-tag-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
  }
  .bar-pct {
    font-size: 13px;
    font-weight: 800;
  }
  .bar-track {
    width: 100%;
    height: 10px;
    background: var(--surface2);
    border-radius: 999px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .bar-fill.before { background: linear-gradient(90deg, #ef4444, #f97316); }
  .bar-fill.after  { background: linear-gradient(90deg, #22c55e, #10b981); }
  .analysis-divider {
    height: 1px;
    background: var(--border);
    margin: 18px 20px 0;
  }
  .analysis-summary {
    padding: 16px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .ai-main {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.4;
  }
  .ai-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
  }
  .ai-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 2px;
  }
  .ai-tag {
    font-size: 11px;
    font-weight: 600;
    border-radius: 999px;
    padding: 4px 10px;
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
  }

  /* ─── Action buttons ─── */
  .actions {
    display: flex;
    gap: 10px;
  }
  .btn {
    flex: 1;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn:active { transform: scale(0.97); }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn:hover { opacity: 0.85; }

  /* ─── Upload trigger ─── */
  .compare-slot input[type="file"] { display: none; }

  /* ─── Download button ─── */
  .btn-download {
    display: flex;
    align-items: center;
    gap: 5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 999px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    margin-left: auto;
    flex-shrink: 0;
  }
  .btn-download:disabled {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    cursor: not-allowed;
  }
  .btn-download:not(:disabled):hover  { opacity: 0.85; }
  .btn-download:not(:disabled):active { transform: scale(0.97); }

  /* ─── Responsive tweaks ─── */
  @media (max-width: 360px) {
    .gauge-wrap { width: 100px; height: 100px; }
    .gauge-svg { width: 100px; height: 100px; }
    .gauge-pct { font-size: 22px; }
  }
</style>
</head>
<body>

<script>
const RESULT_DATA = {
  // "safe" | "warn" | "danger"
  level: "safe",

  // 0–100
  protectionScore: 87,

  // comparison bar values (%)
  similarityBefore: 98,
  similarityAfter:  12,

  // photo metadata (replace src with real URL or base64)
  photo: {
    originalSrc:  "",   // empty → shows placeholder; set to data:image/... or URL
    protectedSrc: "",   // empty → shows placeholder
    filename: "profile_photo.jpg",
    size: "2.4 MB"
  },

  // timestamp
  analyzedAt: "2026-04-26 · 14:32",

  // optional overrides per level (leave null to use defaults below)
  customHeadline: null,
  customDesc:     null
};

/* ── Level configs ─────────────────────────────────────── */
const LEVEL_CONFIG = {
  safe: {
    label: "안전",
    icon:  "✦",
    color: "var(--safe)",
    dim:   "var(--safe-dim)",
    headline: score => `사진이 ${score}% 보호되어 있어요`,

    tags:  ["공유 가능", "딥페이크 차단됨"]

  warn: {

    desc:  "어느 정도 보호되어 있지만 완벽하지 않아요. 중요한 사진이라면 재처리 후 사용하세요.",
    tags:  ["신중하게 공유", "재처리 권장"]

  danger: {

    icon:  "✕",

    headline: score => `보호 강도가 ${score}%로 낮아요`,
    desc:  "지금 상태로 공유하면 딥페이크에 악용될 수 있어요. 재처리 후 사용하세요.",
    tags:  ["공유 보류 권장", "재처리 필요"]
  }
};
</script>

<script>
/* ════════════════════════
   Render from RESULT_DATA
   ════════════════════════ */
(function init() {
  const d    = RESULT_DATA;
  const cfg  = LEVEL_CONFIG[d.level];
  const clr  = cfg.color;

  /* timestamp */
  document.getElementById('analyzed-at').textContent = d.analyzedAt;

  /* compare photos */
  if (d.photo.originalSrc)  showSlot('original',  d.photo.originalSrc);
  if (d.photo.protectedSrc) showSlot('protected', d.photo.protectedSrc);

  document.getElementById('file-original').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) showSlot('original', URL.createObjectURL(file));
  });
  document.getElementById('file-protected').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) showSlot('protected', URL.createObjectURL(file));
  });

  /* badge */
  const badge = document.getElementById('status-badge');
  badge.style.background = cfg.dim;
  badge.style.color = clr;
  badge.style.border = `1px solid ${clr}40`;
  document.getElementById('badge-icon').textContent  = cfg.icon;
  document.getElementById('badge-label').textContent = cfg.label;

  /* status title */
  document.getElementById('status-title').textContent =
    d.level === 'safe'   ? '보호 상태 양호' :
    d.level === 'warn'   ? '보호 수준 보통' : '보호 수준 낮음';

  /* stat reduction */
  const reduction = d.similarityBefore - d.similarityAfter;
  document.getElementById('stat-reduction').textContent = `−${reduction}%p`;

  /* gauge animation */
  const gaugeFill = document.getElementById('gauge-fill');
  gaugeFill.style.stroke = clr;
  const circum = 2 * Math.PI * 48; // ≈301.59
  const target  = circum - (circum * d.protectionScore / 100);

  const pctEl = document.getElementById('gauge-pct');
  pctEl.style.color = clr;

  setTimeout(() => {
    gaugeFill.style.strokeDashoffset = target;
    animateNumber(pctEl, 0, d.protectionScore, 1400);
  }, 300);

  /* bars */
  document.getElementById('bar-pct-before').textContent = d.similarityBefore + '%';
  document.getElementById('bar-pct-after').textContent  = d.similarityAfter  + '%';
  setTimeout(() => {
    document.getElementById('bar-before').style.width = d.similarityBefore + '%';
    document.getElementById('bar-after').style.width  = d.similarityAfter  + '%';
  }, 500);

  /* AI text */
  document.getElementById('ai-headline').textContent =
    d.customHeadline || cfg.headline(d.protectionScore);
  document.getElementById('ai-desc').textContent =
    d.customDesc || cfg.desc;

  const tagsEl = document.getElementById('ai-tags');
  cfg.tags.forEach(t => {
    const span = document.createElement('span');
    span.className = 'ai-tag';
    span.textContent = '#' + t;
    tagsEl.appendChild(span);
  });
})();

/* ─── helpers ─── */
function showSlot(slot, src) {
  const img = document.getElementById('img-' + slot);
  const ph  = document.getElementById('ph-'  + slot);
  img.src = src;
  img.style.display = 'block';
  ph.style.display  = 'none';
}

function animateNumber(el, from, to, duration) {
  const start = performance.now();
  function step(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 4);
    el.textContent = Math.round(from + (to - from) * ease);
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function resetDemo() {
  location.reload();
}

async function downloadProtected() {
  const img = document.getElementById('img-protected');
  if (!img.src || img.style.display === 'none') return;

  // src → blob 변환 후 a 태그로 다운로드
  const res   = await fetch(img.src);
  const blob  = await res.blob();
  const url   = URL.createObjectURL(blob);
  const a     = document.createElement('a');
  a.href      = url;
  a.download  = 'shieldface_protected.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

async function shareResult() {
  const score = RESULT_DATA.protectionScore;
  const text  = `내 사진이 ${score}% 보호되었습니다! #ShieldFace #딥페이크차단`;
  const btn   = document.querySelector('.btn-primary');

  if (navigator.share) {
    try { await navigator.share({ title: 'ShieldFace 결과', text }); }
    catch (_) {}
    return;
  }

  // Web Share API 미지원 → 클립보드 복사 후 버튼 텍스트 피드백
  try {
    await navigator.clipboard.writeText(text);
  } catch (_) {
    // clipboard도 막힌 환경 대비
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }

  const original = btn.textContent;
  btn.textContent = '복사됨!';
  setTimeout(() => { btn.textContent = original; }, 1800);
}
